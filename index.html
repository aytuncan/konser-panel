<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konser Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ── TOKENS ────────────────────────────────────────────── */
:root {
  --bg: #0a0a0c;
  --surface: #121215;
  --surface2: #1a1a1f;
  --border: #2d2d31;
  --border2: #3a3a40;
  --ink: #e2e8f0;
  --muted: #94a3b8;
  --accent: #6366f1;
  --green: #4ade80;
  --red: #f87171;
  --sidebar-w: 240px;
  --radius: 8px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter', sans-serif;
  background:var(--bg);color:var(--ink);
  line-height:1.5; -webkit-font-smoothing:antialiased;
}

/* ── LAYOUT ────────────────────────────────────────────── */
.app{display:flex;min-height:100vh}

.sidebar{
  width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);padding:20px 12px;
}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 8px 20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:var(--radius);font-size:13.5px;font-weight:500;
  color:#a1a1aa;width:100%;background:none;border:none;margin-bottom:4px;
}
.nav-item:hover{color:#ffffff;background:#1f1f23}
.nav-item.active{color:#ffffff;background:#1f1f23;border-left:2px solid var(--accent);padding-left:10px}

/* ── CARDS ─────────────────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:32px;margin-bottom:24px;
}
.card-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.05em;color:var(--muted);margin-bottom:20px;
}

/* ── TABLES ────────────────────────────────────────────── */
.atable{width:100%;border-collapse:collapse;font-size:13px}
.atable th{
  text-align:right;color:var(--muted);font-size:11px;text-transform:uppercase;
  padding:12px 8px;border-bottom:1px solid var(--border);font-weight:600;
}
.atable td{padding:12px 8px;border-bottom:1px solid var(--border)}

/* ── BUTTONS ───────────────────────────────────────────── */
.btn{
  padding:10px 16px;border-radius:var(--radius);border:none;
  font-size:13px;font-weight:600;transition:all .2s ease;
}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:#4f46e5;transform:translateY(-1px)}
.btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--border2)}

/* ── SAVED ITEM ────────────────────────────────────────── */
.saved-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;display:flex;justify-content:space-between;
}
.saved-item:hover{background:#18181b;border-color:#3f3f46}

</style>
</head>
<body>
</body>
</html>
